<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUAL TRAILS</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/193401bb99.js" crossorigin="anonymous"></script>
</head>

<body>


  <nav class="nav">
    <div class="nav__panel">
      <div class="nav__burger">
        <i class="fa-solid fa-bars burger"></i>
      </div>
      <a class="nav__home" href="">
        <div class="nav__img"></div>
      </a>
    </div>
    <div class="nav__menu">
      <a class="nav__item" href="pages/allproducts">products</a>
      <a class="nav__item" href="pages/events">events</a>
      <a class="nav__item" href="pages/aboutUs">about us</a>
    </div>
  </nav>
  <div class="content">
    <div class="slider">
      <img name="slide" alt="slider" class="slider__img">
    </div>

    <section class="products">
      <div class="product">
        <a class="link" href="/pages/products/product1">
          <img src="../images/product1/foto1main.jpg" alt="produkt1" class="product__img">
          <h2 class="product__name">bluza - klin</h2>
          <p class="product__price"><s class="product__old-price">250,00 PLN</s> 200,00 PLN</p>
        </a>
      </div>
      <div class="product">
        <a class="link" href="/pages/products/product2">
          <img src="../images/product2/foto1.jpg" alt="produkt2" class="product__img">
          <h2 class="product__name">butelka termiczna 600ml</h2>
          <p class="product__price"><s class="product__old-price">100,00 PLN</s> 80,00 PLN</p>
        </a>
      </div>
      <div class="product">
        <a class="link" href="/pages/products/product3">
          <img src="../images/product3/foto1.jpg" alt="produkt3" class="product__img">
          <h2 class="product__name">t-shirt cracworx</h2>
          <p class="product__price"><s class="product__old-price">100,00 PLN</s> 70,00 PLN</p>
        </a>
      </div>
      <div class="product">
        <a class="link" href="/pages/products/product4">
          <img src="../images/product4/foto1.jpg" alt="produkt5" class="product__img">
          <h2 class="product__name">t-shirt kosmos</h2>
          <p class="product__price"><s class="product__old-price">100,00 PLN</s> 70,00 PLN</p>
        </a>
      </div>
    </section>

  </div>
  <footer class="footer">
    <div class="footer__item contact">
      <p class="item__name">Contact</p>
      <a href="mailto:info@dualtrails.com"><i class="fa-regular fa-envelope footer__icon"></i></a>
      <p class="footer__mail">info@dualtrails.com</p>
    </div>

    <div class="footer__item social">
      <p class="item__name">Find Us</p>
      <a href="https://www.instagram.com/dualtrails/"><i class="fa-brands fa-instagram footer__icon"></i></a>
      <a href="https://www.facebook.com/DualTrails"><i class="fa-brands fa-facebook-f footer__icon"></i></a>
      <a href="https://www.youtube.com/c/sooczek"><i class="fa-brands fa-youtube footer__icon" class=""></i></a>
    </div>

    <div class="footer__item zrzutka">
      <p class="item__name">no dig no ride</p>
      <a href="https://zrzutka.pl/z/dualtrails">
        <div class="footer__pig"></div>
      </a>
    </div>
  </footer>

  <script src="scripts/script.js"></script>
  <script src="scripts/nav.js"></script>
</body>

</html>
